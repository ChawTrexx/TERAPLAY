<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraBox Auto Player</title>
  <link rel="icon" href="logo.png">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      margin: 20px 0;
      font-size: 1.5rem;
      color: #00ffff;
      text-align: center;
    }

    video {
      width: 90%;
      max-width: 800px;
      border-radius: 10px;
      background: #000;
      margin-top: 20px;
    }

    #buttons {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    a {
      padding: 10px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      color: #fff;
      transition: 0.3s;
    }

    a:hover {
      opacity: 0.8;
    }

    #fastDownloadBtn { background: #28a745; }
    #directDownloadBtn { background: #0056B3; }
  </style>
</head>
<body>
  <header>🎬 TeraBox Auto Player</header>
  <video id="videoPlayer" controls autoplay></video>
  <div id="buttons"></div>

  <script>
    const videoPlayer = document.getElementById('videoPlayer');
    const buttonsDiv = document.getElementById('buttons');

    // Get TeraBox URL from query param ?q=
    const urlParams = new URLSearchParams(window.location.search);
    const teraLink = urlParams.get('q');

    if (!teraLink) {
      buttonsDiv.innerHTML = '<p style="color:yellow;">No TeraBox link provided.</p>';
    } else {
      // Fetch video details from your API
      fetch('https://tboxdownloader.in/tbox/basic/v2/tbox_v2.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ link: teraLink })
      })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          buttonsDiv.innerHTML = `<p style="color:#ff5722;">Error: ${data.error}</p>`;
          return;
        }

        const file = data.files[0];
        const fastLink = file.proxy_download_url;
        const directLink = file.download_link;
        const playLink = file.m3u8_url;

        // Auto-play video
        const streamUrl = playLink || fastLink || directLink;
        if (!streamUrl) {
          buttonsDiv.innerHTML = '<p style="color:yellow;">No playable video found.</p>';
          return;
        }

        if (streamUrl.endsWith('.m3u8') && window.Hls && Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(streamUrl);
          hls.attachMedia(videoPlayer);
          hls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
        } else {
          videoPlayer.src = streamUrl;
        }

        // Show download buttons
        buttonsDiv.innerHTML = `
          <a id="fastDownloadBtn" href="${fastLink}" target="_blank">Fast Download</a>
          <a id="directDownloadBtn" href="${directLink}" target="_blank">Download Now</a>
        `;
      })
      .catch(err => {
        console.error(err);
        buttonsDiv.innerHTML = '<p style="color:#ff5722;">Failed to fetch video info.</p>';
      });
    }
  </script>
</body>
</html>
