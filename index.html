<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeraBox Downloader</title>
<link rel="icon" href="logo.png">
<style>
body {
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:#fff;
  margin:0;
  padding:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}
header {
  margin-top:10px;
  display:flex;
  align-items:center;
  gap:10px;
}
header img {
  width:45px;
  height:45px;
  border-radius:8px;
}
header h1 {
  font-size:1.8rem;
  background:linear-gradient(90deg,#00d4ff,#ff00ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin:0;
}
.container {
  margin-top:40px;
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:20px;
  width:95%;
  max-width:500px;
  box-shadow:0 0 15px rgba(255,0,255,0.2);
  display:flex;
  flex-direction:column;
  align-items:center;
}
input {
  width:90%;
  max-width:400px;
  padding:12px;
  border-radius:6px;
  border:1px solid #444;
  background:#1a1a1a;
  color:#fff;
  font-size:16px;
  outline:none;
  text-align:center;
}
button {
  margin-top:15px;
  width:90%;
  max-width:400px;
  padding:12px;
  border:none;
  border-radius:6px;
  background:linear-gradient(90deg,#ff00ff,#00d4ff);
  color:#fff;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover { opacity:0.85; }
#videoContainer {
  margin-top:25px;
  width:100%;
  max-width:800px;
  background:#000;
  display:none;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}
#videoPlayer {
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}
#output {
  margin-top:15px;
  text-align:center;
  word-break: break-word;
}
a {
  text-decoration:none;
  color:inherit;
  display:inline-block;
  margin:5px 5px 0 0;
  padding:10px 16px;
  border-radius:6px;
}
@media (max-width:480px) {
  header h1 { font-size:1.4rem; }
  input, button { font-size:15px; }
}
</style>
</head>
<body>

<header>
<img src="logo.png" alt="Logo">
<h1>TeraBox Downloader</h1>
</header>

<div class="container">
<input type="text" id="teraboxLink" placeholder="Paste TeraBox link here..." />
<button id="downloadV1Button">Get Download Links & Play</button>
<div id="videoContainer">
  <video id="videoPlayer" controls autoplay></video>
</div>
<div id="output"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const downloadV1Button = document.getElementById('downloadV1Button');
  const output = document.getElementById('output');
  const linkInput = document.getElementById('teraboxLink');
  const videoContainer = document.getElementById('videoContainer');
  const videoPlayer = document.getElementById('videoPlayer');

  async function playTeraBox(link) {
    if (!link) return;
    linkInput.value = link; // fill input

    output.innerHTML = `<div style="display:flex;justify-content:center;align-items:center;">
      <div style="width:40px;height:40px;border:4px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
      </div><style>@keyframes spin { to { transform: rotate(360deg); } }</style>`;

    try {
      const res = await fetch('https://tboxdownloader.in/tbox/basic/v2/tbox_v2.php', {
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body: JSON.stringify({ link })
      });

      if (!res.ok) throw new Error('Network error');
      const data = await res.json();
      if (data.error) { output.innerHTML=`<p style="color:#ff5722;">Error: ${data.error}</p>`; return; }

      const file = data.files && data.files[0];
      const fileName = file.file_name || 'Unknown';
      const fileSize = file.file_size || 'Unknown';
      const fastLink = file.proxy_download_url;
      const directLink = file.download_link;
      const playLink = file.m3u8_url;

      output.innerHTML = `
        <p><strong>File Name:</strong> ${fileName}</p>
        <p><strong>File Size:</strong> ${fileSize}</p>
        <a href="${fastLink}" target="_blank" style="background:#28a745;color:#fff;">Fast Download</a>
        <a href="${directLink}" target="_blank" style="background:#0056B3;color:#fff;">Download Now</a>
      `;

      if (!playLink) { videoContainer.style.display='none'; return; }

      // Create a temporary video element to detect aspect ratio
      const tempVid = document.createElement('video');
      tempVid.src = playLink;
      tempVid.addEventListener('loadedmetadata', ()=>{
        const ratio = tempVid.videoWidth / tempVid.videoHeight;
        videoContainer.style.aspectRatio = ratio.toFixed(2);
        videoContainer.style.display='block';
      });

      // Play video via HLS.js
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(playLink);
        hls.attachMedia(videoPlayer);
        hls.on(Hls.Events.MANIFEST_PARSED,()=>videoPlayer.play());
      } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
        videoPlayer.src=playLink;
        videoPlayer.play();
      } else { alert("Your browser doesn't support HLS playback."); }

    } catch(err) {
      console.error(err);
      output.innerHTML = '<p style="color:#ff5722;">Failed to fetch file info. Try again.</p>';
      videoContainer.style.display='none';
    }
  }

  downloadV1Button.addEventListener('click', ()=>playTeraBox(linkInput.value.trim()));

  // Auto-play from URL param ?q=
  const params = new URLSearchParams(window.location.search);
  const qLink = params.get('q');
  if (qLink) playTeraBox(qLink);

});
</script>
</body>
</html>
