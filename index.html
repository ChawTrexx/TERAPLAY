    /* Header */

      background: #1f1f1f;

    #downloadLink {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 16px;

      background: #1f1f1f;
      color: #ccc;

  <main> 
    <div style="text-align:center; margin-bottom:15px;">
  <button id="server1" style="background:#00aaff; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Server 1</button>
  <button id="server2" style="background:#ff007f; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Server 2</button>
  <button id="server3" style="background:#00c853; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Server 3</button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const videoUrl = params.get('q');

  document.getElementById('server1').onclick = () => {
    window.location.href = `https://teraplayer.vercel.app/?q=${encodeURIComponent(videoUrl)}`;
  };

  document.getElementById('server2').onclick = () => {
    window.location.href = `https://teraplayer.vercel.app/s2/?q=${encodeURIComponent(videoUrl)}`;
  };

  document.getElementById('server3').onclick = () => {
    window.location.href = `https://teraplayer.vercel.app/s3/?q=${encodeURIComponent(videoUrl)}`;
  };
</script>
    
    <div id="videoContainer">
      <video id="popupVideo" controls autoplay playsinline preload="auto"></video>
      <div id="loadingText">Fetching video, please wait...</div>
      <a id="downloadLink" href="#" target="_blank" rel="noreferrer" style="display:none;">Download Video</a>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    ** Wait 10-15 sec to start streaming the video. Refresh this page if video doesn't load **
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(window.location.search);
      const teraboxUrl = params.get("q");
      const video = document.getElementById("popupVideo");
      const downloadLink = document.getElementById("downloadLink");
      const loadingText = document.getElementById("loadingText");

      if (!teraboxUrl) {
        loadingText.textContent = "Error: No TeraBox link found in URL.";
        return;
      }

      try {
        const encoded = encodeURIComponent(teraboxUrl);
        const endpoint = `https://tboxdownloader.in/tbox/tp/v1/s2_v1.php?data=${encoded}`;
        const res = await fetch(endpoint);
        if (!res.ok) throw new Error("Server 2 request failed");
        const data = await res.json();

        if (data && data.direct_link) {
          const finalUrl = `https://sweet-field-bb2f.hdmovielover.workers.dev/?url=${encodeURIComponent(data.direct_link)}`;
          video.src = finalUrl;
          video.play();

          loadingText.style.display = "none";

          // Show download link
          downloadLink.href = data.direct_link;
          downloadLink.textContent = `Download (${data.size || "Video"})`;
          downloadLink.style.display = "inline-block";
        } else {
          loadingText.textContent = "No video found on Server 1!";
        }
      } catch (err) {
        console.error(err);
        loadingText.textContent = "Failed to fetch video..Check another server";
      }
    });
  </script>
