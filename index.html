  <style>
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 177.78%; /* 9:16 */
      overflow: hidden;
      border-radius: 0.5rem;
      background: #000;
    }
    .video-wrapper iframe {

    }
    .loading-overlay {
      position: absolute;
      inset: 0;

<body class="bg-gray-100 flex flex-col items-center min-h-screen">

  <!-- Header -->
  <header class="w-full h-16 bg-gray-900 text-white flex items-center justify-between px-4">
    <h1 class="text-lg font-semibold">TeraPlayer</h1>
    <a href="https://t.me/+Q656m5kaC245Njg1" target="_blank" rel="noopener noreferrer"
       class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-sm inline-block">
      Join Channel
    </a>
  </header>

  <!-- Main Stream Container -->
  <main class="stream-container w-full max-w-4xl mx-auto mt-4 flex flex-col items-center px-2">
    <!-- File Info -->
    <h1 id="file-info" class="text-center text-lg font-medium text-gray-800 mb-4">
      Loading video...
    </h1>

    <!-- Video Container -->
    <div id="video-container" class="w-full bg-black rounded-lg relative">
      <div class="video-wrapper">
        <div class="loading-overlay" id="loading-text">Loading video...</div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full bg-gray-900 text-gray-300 text-center text-xs py-2 mt-auto">
    ** Wait 10-15 sec to start streaming the video. Refresh this page if video doesn't load **
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const terabox_url = params.get('q'); 
      const videoContainer = document.getElementById('video-container');
      const fileInfoDiv = document.getElementById('file-info');
      const loadingText = document.getElementById('loading-text');

      if (!terabox_url) {
        fileInfoDiv.textContent = 'Error: No TeraBox URL provided.';
        videoContainer.innerHTML = `<div class="error-message">Please provide a TeraBox URL using the ?q= parameter.</div>`;
        return;
      }

      // Replace domain
      const modifiedUrl = terabox_url.replace(/(https?:\/\/)[^/]+/, '$11024terabox.com');

      document.title = 'DesiPapa.xxx';
      fileInfoDiv.textContent = 'Loading video...';

      const API_KEY = 'terabox_downloader_2025_key';

      async function generatePlayerUrl(url) {
        try {
          const response = await fetch('https://api.iteraplay.com/generate-player-url.php', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
              'X-API-Key': API_KEY,
              'Origin': window.location.origin
            },
            body: `url=${encodeURIComponent(url)}`
          });
          if (!response.ok) throw new Error(`HTTP error ${response.status}`);
          const result = await response.json();
          if (result.success && result.player_url) return result.player_url;
          throw new Error(result.error || 'Failed to generate player URL');
        } catch (err) {
          console.error('Error details:', err);
          throw err;
        }
      }

      // Auto-load video
      (async () => {
        try {
          const playerUrl = await generatePlayerUrl(modifiedUrl);
          const iframe = document.createElement('iframe');
          iframe.src = playerUrl;
          iframe.allow = 'autoplay; fullscreen; encrypted-media';
          iframe.allowFullscreen = true;

          const wrapper = videoContainer.querySelector('.video-wrapper');
          wrapper.innerHTML = ''; // remove loading overlay
          wrapper.appendChild(iframe);

          fileInfoDiv.textContent = '';
        } catch (err) {
          fileInfoDiv.textContent = 'Error: Failed to load video';
          videoContainer.querySelector('.video-wrapper').innerHTML = `<div class="error-message">Error: ${err.message}</div>`;
        }
      })();
    });
  </script>
</body>
