  <script>
    document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const teraboxUrl = params.get('q');
  const videoContainer = document.getElementById('video-container');
  const fileInfoDiv = document.getElementById('file-info');
  const wrapper = videoContainer.querySelector('.video-wrapper');

  if (!teraboxUrl) {
    fileInfoDiv.textContent = 'Error: No TeraBox URL provided.';
    wrapper.innerHTML = `<div class="error-message">Please provide a TeraBox URL using ?q= parameter.</div>`;
    return;
  }

  // Modify the URL to replace domain as required
  const modifiedUrl = teraboxUrl.replace(/(https?://)[^/]+/, '$11024terabox.com');

  const API_KEY = 'terabox_downloader_2025_key';
  const MAX_RETRIES = 3;
  const BASE_RETRY_DELAY = 2000; // 2 seconds

  // Helper to fetch with timeout
  const fetchWithTimeout = (resource, options = {}, timeout = 8000) => {
    return Promise.race([
      fetch(resource, options),
      new Promise((_, reject) =>
        setTimeout(() => reject(new Error('Request timed out')), timeout)
      )
    ]);
  };

  // Generate the player URL from API
  async function generatePlayerUrl(url) {
    const response = await fetchWithTimeout('https://api.iteraplay.com/generate-player-url.php', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'X-API-Key': API_KEY,
        'Origin': window.location.origin,
      },
      body: `url=${encodeURIComponent(url)}`
    });

    if (!response.ok) {
      throw new Error(`HTTP error ${response.status}`);
    }

    const result = await response.json();

    if (result.success && result.player_url) {
      return result.player_url;
    } else {
      throw new Error(result.error || 'Failed to generate player URL');
    }
  }

  // Retry logic with exponential backoff
  async function loadVideoWithRetry(url, retries = MAX_RETRIES) {
    for (let attempt = 1; attempt <= retries; attempt++) {
      fileInfoDiv.textContent = `Loading video... (Attempt ${attempt} of ${retries})`;
      try {
        const playerUrl = await generatePlayerUrl(url);

        // Clear loading overlay and embed iframe
        wrapper.innerHTML = '';
        const iframe = document.createElement('iframe');
        iframe.src = playerUrl;
        iframe.allow = 'autoplay; fullscreen; encrypted-media';
        iframe.allowFullscreen = true;
        iframe.loading = 'lazy';
        wrapper.appendChild(iframe);

        fileInfoDiv.textContent = ''; // Clear status on success
        return;
      } catch (error) {
        console.warn(`Attempt ${attempt} failed: ${error.message}`);

        if (attempt < retries) {
          // Exponential backoff delay
          const delay = BASE_RETRY_DELAY * Math.pow(2, attempt - 1);
          await new Promise(res => setTimeout(res, delay));
        } else {
          fileInfoDiv.textContent = 'Failed to load video. Please try again.';
          wrapper.innerHTML = `
            <div class="error-message">
              Failed to load video after ${retries} attempts. Please refresh the page.
            </div>`;
        }
      }
    }
  }

  loadVideoWithRetry(modifiedUrl);
});
  </script>
