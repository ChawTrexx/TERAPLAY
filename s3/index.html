  <script>
    document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const terabox_url = params.get('q');
  const videoContainer = document.getElementById('video-container');
  const fileInfoDiv = document.getElementById('file-info');

  if (!terabox_url) {
    fileInfoDiv.textContent = 'Error: No TeraBox URL provided.';
    videoContainer.innerHTML = `<div class="error-message">Please provide a TeraBox URL using ?q= parameter.</div>`;
    return;
  }

  const modifiedUrl = terabox_url.replace(/(https?:\/\/)[^/]+/, '$11024terabox.com');
  const API_KEY = 'terabox_downloader_2025_key';
  const MAX_RETRIES = 5;
  const INITIAL_DELAY = 2000; // 2 seconds
  const TIMEOUT = 10000; // 10 seconds per request

  function createIframe(src) {
    const iframe = document.createElement('iframe');
    iframe.src = src;
    iframe.allow = 'autoplay; fullscreen; encrypted-media';
    iframe.allowFullscreen = true;
    iframe.width = '100%';
    iframe.height = '100%';
    iframe.style.border = 'none';
    return iframe;
  }

  function showError(message) {
    fileInfoDiv.textContent = message;
    const wrapper = videoContainer.querySelector('.video-wrapper');
    wrapper.innerHTML = `<div class="error-message">${message}</div>`;
  }

  async function fetchWithTimeout(url, options = {}, timeout = TIMEOUT) {
    return Promise.race([
      fetch(url, options),
      new Promise((_, reject) => setTimeout(() => reject(new Error('Request timed out')), timeout))
    ]);
  }

  async function generatePlayerUrl(url) {
    try {
      const response = await fetchWithTimeout('https://api.iteraplay.com/generate-player-url.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
          'X-API-Key': API_KEY,
          'Origin': window.location.origin
        },
        body: `url=${encodeURIComponent(url)}`
      });

      if (!response.ok) throw new Error(`HTTP error ${response.status}`);

      const result = await response.json();
      if (result.success && result.player_url) return result.player_url;
      throw new Error(result.error || 'Failed to generate player URL');
    } catch (err) {
      console.error('Error generating player URL:', err);
      throw err;
    }
  }

  async function loadVideoWithRetry(url, attempt = 1, delay = INITIAL_DELAY) {
    const wrapper = videoContainer.querySelector('.video-wrapper');
    fileInfoDiv.textContent = `Loading video... (${attempt})`;

    try {
      const playerUrl = await generatePlayerUrl(url);
      wrapper.innerHTML = '';
      wrapper.appendChild(createIframe(playerUrl));
      fileInfoDiv.textContent = '';
    } catch (err) {
      console.warn(`Attempt ${attempt} failed: ${err.message}`);

      if (attempt < MAX_RETRIES) {
        setTimeout(() => loadVideoWithRetry(url, attempt + 1, delay * 1.5), delay);
      } else {
        showError('Failed to load video after multiple attempts. You can try refreshing the page or check your TeraBox URL.');
        // Optional fallback
        const fallbackLink = document.createElement('a');
        fallbackLink.href = url;
        fallbackLink.textContent = 'Open TeraBox Video';
        fallbackLink.target = '_blank';
        wrapper.appendChild(fallbackLink);
      }
    }
  }

  // Initialize wrapper
  videoContainer.innerHTML = `<div class="video-wrapper" style="width:100%;height:100%;position:relative;">
    <div class="loading-spinner">Loading...</div>
  </div>`;

  // Start loading
  loadVideoWithRetry(modifiedUrl);
});
  </script>
