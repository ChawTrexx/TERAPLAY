<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraBox Video Player - Server 2</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 { color: #00d1ff; margin-bottom: 20px; }
    #teraboxLink { width: 80%; max-width: 500px; padding: 10px; border-radius: 6px; border: none; outline: none; font-size: 16px; }
    #downloadBtn { margin-left: 10px; padding: 10px 20px; border-radius: 6px; border: none; background: #00d1ff; color: #000; font-weight: bold; cursor: pointer; }
    #videoContainer { margin-top: 20px; }
    #popupVideo { width: 100%; max-width: 800px; height: 450px; background: #000; border-radius: 8px; }
    #downloadLink { display: inline-block; margin-top: 15px; padding: 10px 16px; background: #28a745; color: #fff; border-radius: 6px; text-decoration: none; }
  </style>
</head>
<body>

<h1>𝗧𝗘𝗥𝗔𝗣𝗟𝗔𝗬 𝗕𝗼𝘁</h1>

<input type="text" id="teraboxLink" placeholder="Paste TeraBox link here..." />
<button id="downloadBtn">Play Video</button>

<div id="videoContainer">
  <video id="popupVideo" controls></video>
  <a id="downloadLink" href="#" target="_blank" rel="noreferrer">Download Video</a>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("downloadBtn");
  const input = document.getElementById("teraboxLink");
  const video = document.getElementById("popupVideo");
  const downloadLink = document.getElementById("downloadLink");

  btn.addEventListener("click", async () => {
    const url = input.value.trim();
    if (!url) return alert("Please enter a TeraBox link!");
    const encoded = encodeURIComponent(url);

    try {
      const endpoint = `https://tboxdownloader.in/tbox/tp/v1/s2_v1.php?data=${encoded}`;
      const res = await fetch(endpoint);
      if (!res.ok) throw new Error("Server 2 request failed");
      const data = await res.json();

      if (data && data.direct_link) {
        // Play video
        video.src = `https://sweet-field-bb2f.hdmovielover.workers.dev/?url=${encodeURIComponent(data.direct_link)}`;
        video.play();

        // Set download link
        downloadLink.href = data.direct_link;
        downloadLink.textContent = `Download (${data.size})`;
      } else {
        alert("No video found on Server 2!");
      }
    } catch (err) {
      console.error(err);
      alert("Failed to fetch video from Server 2.");
    }
  });
});
</script>

</body>
</html>
