<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraBox Video Player - Server 2</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      margin: 0;
      padding: 5px;
      text-align: center;
    }
    h1 { color: #00d1ff; margin-bottom: 20px; }
    #teraboxLink { width: 80%; max-width: 500px; padding: 10px; border-radius: 6px; border: none; outline: none; font-size: 16px; }
    #downloadBtn { margin-left: 10px; padding: 10px 20px; border-radius: 6px; border: none; background: #00d1ff; color: #000; font-weight: bold; cursor: pointer; }
    #videoContainer { margin-top: 20px; }
    #popupVideo { width: 100%; max-width: 800px; height: 450px; background: #000; border-radius: 8px; }
    #downloadLink { display: inline-block; margin-top: 15px; padding: 10px 16px; background: #28a745; color: #fff; border-radius: 6px; text-decoration: none; }
  </style>
</head>
<body>

<div style="display: flex; align-items: center;justify-content: center; gap: 8px;">
  <img src="./logo.png" alt="Logo" width="40" height="40">
  <h1>𝗧𝗘𝗥𝗔𝗣𝗟𝗔𝗬 𝗕𝗼𝘁</h1>
</div>

<input type="text" id="teraboxLink" placeholder="Paste TeraBox link here..." />
<button id="downloadBtn" style="margin-top: 4px;">Play Video</button>

<div id="videoContainer">
  <video id="popupVideo" controls></video>
  <a id="downloadLink" href="#" target="_blank" rel="noreferrer">Download Video</a>
</div> 

<!-- Optional ad script -->
<script>
(function(tdg){
var d=document,s=d.createElement('script'),l=d.scripts[d.scripts.length-1];
s.settings=tdg||{};
s.src="//scientific-husband.com/bWXgVks.d-Gzl/0-Y/WEcE/heVmG9BunZcU/lXkdPbTZYJ2YNIziAQxFOyD/cRtoNHjAYC3OMiD/Ea4/OYAF";
s.async=true;
s.referrerPolicy='no-referrer-when-downgrade';
l.parentNode.insertBefore(s,l);
})({})
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("downloadBtn");
  const input = document.getElementById("teraboxLink");
  const video = document.getElementById("popupVideo");
  const downloadLink = document.getElementById("downloadLink");

  // Simple loader while fetching
  function showLoading(state) {
    if (state) {
      downloadLink.textContent = "Fetching video...";
      downloadLink.style.background = "#ffc107";
      downloadLink.removeAttribute("href");
    } else {
      downloadLink.style.background = "#28a745";
    }
  }

  btn.addEventListener("click", async () => {
    const url = input.value.trim();
    if (!url) return alert("Please enter a TeraBox link!");
    const encoded = encodeURIComponent(url);

    // --- API 1 (Primary) ---
    showLoading(true);
    try {
      const res1 = await fetch(`https://tboxdownloader.in/tbox/tp/v1/s1_v2.php?url=${encoded}`);
      if (!res1.ok) throw new Error("API 1 failed");
      const data1 = await res1.json();

      if (data1 && data1.directlink) {
        const playURL = `https://sweet-field-bb2f.hdmovielover.workers.dev/?url=${encodeURIComponent(data1.directlink)}`;
        video.src = playURL;
        video.play();

        downloadLink.href = data1.directlink;
        downloadLink.textContent = `Download (${data1.size || "Unknown"})`;
        showLoading(false);
        return; // Success, stop here
      }
      throw new Error("Invalid response from API 1");
    } catch (err1) {
      console.warn("API 1 failed:", err1);
    }

    // --- API 2 (Fallback) ---
    try {
      const res2 = await fetch(`https://tboxdownloader.in/tbox/tp/v1/s2_v1.php?data=${encoded}`);
      if (!res2.ok) throw new Error("API 2 failed");
      const data2 = await res2.json();

      if (data2 && data2.direct_link) {
        const playURL = `https://sweet-field-bb2f.hdmovielover.workers.dev/?url=${encodeURIComponent(data2.direct_link)}`;
        video.src = playURL;
        video.play();

        downloadLink.href = data2.direct_link;
        downloadLink.textContent = `Download (${data2.size || "Unknown"})`;
        showLoading(false);
        return;
      }
      throw new Error("Invalid response from API 2");
    } catch (err2) {
      console.error("API 2 failed:", err2);
      showLoading(false);
      alert("Both API 1 and API 2 failed to fetch video!");
    }
  });
});
</script>

</body>
</html>
