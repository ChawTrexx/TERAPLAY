<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraBox Video Player - Dual API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      margin: 0;
      padding: 5px;
      text-align: center;
    }
    h1 { color: #00d1ff; margin-bottom: 20px; }
    #teraboxLink { width: 80%; max-width: 500px; padding: 10px; border-radius: 6px; border: none; outline: none; font-size: 16px; }
    #downloadBtn { margin-left: 10px; padding: 10px 20px; border-radius: 6px; border: none; background: #00d1ff; color: #000; font-weight: bold; cursor: pointer; }
    #videoContainer { margin-top: 20px; }
    #popupVideo { width: 100%; max-width: 800px; height: 450px; background: #000; border-radius: 8px; }
    #downloadLink { display: inline-block; margin-top: 15px; padding: 10px 16px; background: #28a745; color: #fff; border-radius: 6px; text-decoration: none; }
    #statusBox { margin-top: 10px; font-size: 14px; color: #ccc; }
  </style>
</head>
<body>

<div style="display: flex; align-items: center;justify-content: center; gap: 8px;">
  <img src="./logo.png" alt="Logo" width="40" height="40">
  <h1>𝗧𝗘𝗥𝗔𝗣𝗟𝗔𝗬 𝗕𝗼𝘁</h1>
</div>

<input type="text" id="teraboxLink" placeholder="Paste TeraBox link here..." />
<button id="downloadBtn" style="margin-top: 4px;">Play Video</button>
<div id="statusBox"></div>

<div id="videoContainer">
  <video id="popupVideo" controls></video>
  <a id="downloadLink" href="#" target="_blank" rel="noreferrer">Download Video</a>
</div> 

<script>
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("downloadBtn");
  const input = document.getElementById("teraboxLink");
  const video = document.getElementById("popupVideo");
  const downloadLink = document.getElementById("downloadLink");
  const statusBox = document.getElementById("statusBox");

  async function fetchFromAPI1(encoded) {
    statusBox.textContent = "Trying Server 1...";
    const res = await fetch(`https://tboxdownloader.in/tbox/tp/v1/s1_v2.php?url=${encoded}`);
    if (!res.ok) throw new Error("Server 1 not reachable");
    const data = await res.json();
    if (data && data.directlink) return { link: data.directlink, size: data.size, server: "Server 1" };
    throw new Error("Invalid data from Server 1");
  }

  async function fetchFromAPI2(encoded) {
    statusBox.textContent = "Trying Server 2...";
    const res = await fetch(`https://tboxdownloader.in/tbox/tp/v1/s2_v1.php?data=${encoded}`);
    if (!res.ok) throw new Error("Server 2 not reachable");
    const data = await res.json();
    if (data && data.direct_link) return { link: data.direct_link, size: data.size, server: "Server 2" };
    throw new Error("Invalid data from Server 2");
  }

  async function tryBothAPIs(encoded) {
    try {
      return await fetchFromAPI1(encoded);
    } catch (err1) {
      console.warn("Server 1 failed:", err1);
      try {
        return await fetchFromAPI2(encoded);
      } catch (err2) {
        console.error("Server 2 failed:", err2);
        throw new Error("Both APIs failed");
      }
    }
  }

  btn.addEventListener("click", async () => {
    const url = input.value.trim();
    if (!url) return alert("Please enter a TeraBox link!");
    const encoded = encodeURIComponent(url);

    statusBox.style.color = "#ffc107";
    statusBox.textContent = "Fetching video...";
    downloadLink.textContent = "Loading...";
    downloadLink.removeAttribute("href");
    video.src = "";

    try {
      const data = await tryBothAPIs(encoded);
      const streamURL = `https://sweet-field-bb2f.hdmovielover.workers.dev/?url=${encodeURIComponent(data.link)}`;
      video.src = streamURL;
      video.play();

      downloadLink.href = data.link;
      downloadLink.textContent = `Download (${data.size || "Unknown"})`;

      statusBox.style.color = "#28a745";
      statusBox.textContent = `✅ Video loaded from ${data.server}`;
    } catch (err) {
      statusBox.style.color = "red";
      statusBox.textContent = "❌ Both Server 1 and Server 2 failed to fetch video!";
      downloadLink.textContent = "Download Video";
    }
  });
});
</script>

</body>
</html>
