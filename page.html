<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraBox Video Player - Dual API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      margin: 0;
      padding: 5px;
      text-align: center;
    }
    h1 { color: #00d1ff; margin-bottom: 20px; }
    #teraboxLink {
      width: 80%;
      max-width: 500px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
      font-size: 16px;
    }
    #downloadBtn {
      margin-left: 10px;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      background: #00d1ff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    .btn {
      display: inline-block;
      margin: 6px;
      padding: 10px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      color: #fff;
    }
    .btn-primary { background: #007bff; }
    .btn-success { background: #28a745; }
    .btn-warning { background: #ffc107; color: #000; }
    .btn-info { background: #17a2b8; }
    #popupVideo {
      width: 100%;
      max-width: 800px;
      height: 450px;
      background: #000;
      border-radius: 8px;
      margin-top: 20px;
    }
    #outputFast, #outputFasts2 {
      max-width: 850px;
      margin: 20px auto;
      text-align: left;
    }
    #statusBox { margin-top: 10px; font-size: 14px; color: #ccc; }
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    #modal video {
      width: 80%;
      max-width: 800px;
      border-radius: 10px;
    }
    #closeModal {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
  <img src="./logo.png" alt="Logo" width="40" height="40">
  <h1>𝗧𝗘𝗥𝗔𝗣𝗟𝗔𝗬 𝗕𝗼𝘁</h1>
</div>

<input type="text" id="teraboxLink" placeholder="Paste TeraBox link here..." />
<button id="downloadBtn" style="margin-top: 4px;">Play Video</button>
<div id="statusBox"></div>

<!-- API Results -->
<div id="outputFast"></div>
<div id="outputFasts2"></div>

<!-- Video Modal -->
<div id="modal">
  <span id="closeModal">&times;</span>
  <video id="popupVideo" controls></video>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const downloadBtn = document.getElementById("downloadBtn");
  const inputField = document.getElementById("teraboxLink");
  const outputFastDiv = document.getElementById("outputFast");
  const outputFasts2Div = document.getElementById("outputFasts2");
  const popupVideo = document.getElementById("popupVideo");
  const modal = document.getElementById("modal");
  const closeModal = document.getElementById("closeModal");

  closeModal.addEventListener("click", () => {
    modal.style.display = "none";
    popupVideo.pause();
  });

  // Loader generator
  function createLoader() {
    const loader = document.createElement("div");
    loader.innerHTML = "⏳ Loading...";
    loader.style = "padding:10px;color:#ccc;";
    return loader;
  }

  // -----------------------------
  // MAIN CLICK HANDLER
  // -----------------------------
  downloadBtn.addEventListener("click", async () => {
    const url = inputField.value.trim();
    if (!url) return alert("Please paste a TeraBox link first.");

    const encoded = encodeURIComponent(url);
    outputFastDiv.innerHTML = "";
    outputFasts2Div.innerHTML = "";

    const loader1 = createLoader();
    const loader2 = createLoader();
    outputFastDiv.appendChild(loader1);
    outputFasts2Div.appendChild(loader2);

    let api1Success = false;
    let api2Success = false;

    // -----------------------------
    // API 1 (v2.php)
    // -----------------------------
    try {
      const endpoint1 = `https://tboxdownloader.in/tbox/tp/v1/s1_v2.php?url=${encoded}`;
      const response = await fetch(endpoint1);
      if (!response.ok) throw new Error("API 1 failed to respond");

      const data = await response.json();
      if (data && data.directlink) {
        api1Success = true;
        const wrapper = document.createElement("div");
        wrapper.style = `
          margin-top:20px;padding:15px;background:#ffffff22;
          border-radius:8px;text-align:left;
        `;
        wrapper.innerHTML = `
          <h3 style="
            margin-bottom:8px;
            word-wrap:break-word;
            overflow-wrap:break-word;
            word-break:break-all;
          ">${data.file_name || "Unknown File"}</h3>
          <p style="margin-bottom:12px;">Size: ${data.size || "Unknown"}</p>
        `;

        if (data.thumb) {
          const thumb = document.createElement("img");
          thumb.src = data.thumb;
          thumb.alt = "Thumbnail";
          thumb.style.cssText = `
            max-width:100%;border-radius:8px;margin-bottom:12px;
          `;
          wrapper.prepend(thumb);
        }

        const directBtn = document.createElement("a");
        directBtn.href = data.directlink;
        directBtn.target = "_blank";
        directBtn.rel = "noreferrer";
        directBtn.className = "btn btn-primary";
        directBtn.textContent = "Download";

        const fastLink = data.directlink.replace(
          "https://d.terabox.app",
          "https://d8.freeterabox.com"
        );
        const fastBtn = document.createElement("a");
        fastBtn.href = fastLink;
        fastBtn.target = "_blank";
        fastBtn.rel = "noreferrer";
        fastBtn.className = "btn btn-success";
        fastBtn.textContent = "Fast Download";

        const playBtn = document.createElement("a");
        playBtn.href = "#";
        playBtn.className = "btn btn-warning";
        playBtn.textContent = "Watch Online";
        playBtn.addEventListener("click", (e) => {
          e.preventDefault();
          popupVideo.src = `https://sweet-field-bb2f.hdmovielover.workers.dev/?url=${encodeURIComponent(fastLink)}`;
          modal.style.display = "flex";
          popupVideo.play();
        });

        wrapper.append(directBtn, fastBtn, playBtn);
        outputFastDiv.innerHTML = "";
        outputFastDiv.append(wrapper);
      }
    } catch (err) {
      console.error("API 1 error:", err);
      outputFastDiv.innerHTML = "";
    }

    // -----------------------------
    // API 2 (s2_v1.php)
    // -----------------------------
    try {
      const endpoint2 = `https://tboxdownloader.in/tbox/tp/v1/s2_v1.php?data=${encoded}`;
      const response = await fetch(endpoint2);
      if (!response.ok) throw new Error("API 2 failed to respond");

      const data2 = await response.json();
      if (data2 && data2.direct_link) {
        api2Success = true;
        const wrapper2 = document.createElement("div");
        wrapper2.style = `
          margin-top:20px;padding:15px;background:#ffffff22;
          border-radius:8px;text-align:left;
        `;
        wrapper2.innerHTML = `
          <p style="margin-bottom:12px;">Size: ${data2.size || "Unknown"}</p>
        `;

        const fast2Btn = document.createElement("a");
        fast2Btn.href = data2.direct_link;
        fast2Btn.target = "_blank";
        fast2Btn.rel = "noreferrer";
        fast2Btn.className = "btn btn-info";
        fast2Btn.textContent = "Fast Download Server 2";

        const play2Btn = document.createElement("a");
        play2Btn.href = "#";
        play2Btn.className = "btn btn-warning";
        play2Btn.textContent = "Watch Online";
        play2Btn.addEventListener("click", (e) => {
          e.preventDefault();
          popupVideo.src = `https://sweet-field-bb2f.hdmovielover.workers.dev/?url=${encodeURIComponent(data2.direct_link)}`;
          modal.style.display = "flex";
          popupVideo.play();
        });

        wrapper2.append(fast2Btn, play2Btn);
        outputFasts2Div.innerHTML = "";
        outputFasts2Div.append(wrapper2);
      }
    } catch (err) {
      console.error("API 2 error:", err);
      outputFasts2Div.innerHTML = "";
    }

    // -----------------------------
    // Final Fallback
    // -----------------------------
    if (!api1Success && !api2Success) {
      outputFastDiv.innerHTML = `
        <div style="padding:15px;background:#ff4d4d22;color:#ffdddd;border-radius:6px;">
          ⚠️ Both API 1 and API 2 failed to fetch video!<br>
          Please check your link or try again later.
        </div>
      `;
    }
  });
});
</script>

</body>
</html>
