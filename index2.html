<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraPlayer</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Shared via TeraBox" />
  <meta property="og:description" content="Watch this content via TeraBox." />
  <meta property="og:image" content="https://honeycum.fun/Terabox.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 aspect ratio */
      background: #000;
      border-radius: 0.5rem;
      overflow: hidden;
    }
    .video-wrapper iframe, .video-wrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 0.5rem;
    }
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      z-index: 10;
    }
  </style>
</head>
<body class="bg-gray-100 flex flex-col items-center min-h-screen">

<header class="w-full h-16 bg-gray-900 text-white flex items-center justify-between px-4">
  <h1 class="text-lg font-semibold">TeraPlayer</h1>
  <a href="https://t.me/+Q656m5kaC245Njg1" target="_blank" rel="noopener noreferrer"
     class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-sm inline-block">
    Join Channel
  </a>
</header>

<main class="stream-container w-full max-w-4xl mx-auto mt-4 flex flex-col items-center px-2">
  <h1 id="file-info" class="text-center text-lg font-medium text-gray-800 mb-2">
    Loading video...
  </h1>

  <div id="video-container" class="w-full bg-black rounded-lg relative">
    <div class="video-wrapper">
      <div class="loading-overlay" id="loading-text">Loading video...</div>
    </div>
  </div>

  <a id="downloadBtn" href="#" target="_blank" rel="noreferrer"
     class="mt-4 px-6 py-3 bg-green-600 text-white rounded-md hover:bg-green-700 transition hidden">
    Download Video
  </a>
</main>

<footer class="w-full bg-gray-900 text-gray-300 text-center text-xs py-2 mt-6">
  ** Wait 10-15 sec to start streaming the video. Refresh if video doesn't load **
</footer>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const params = new URLSearchParams(window.location.search);
  const teraboxUrl = params.get("q");
  const videoWrapper = document.querySelector(".video-wrapper");
  const loadingOverlay = document.getElementById("loading-text");
  const fileInfo = document.getElementById("file-info");
  const downloadBtn = document.getElementById("downloadBtn");

  if (!teraboxUrl) {
    fileInfo.textContent = "Error: No TeraBox URL provided!";
    loadingOverlay.style.display = "none";
    return;
  }

  const encoded = encodeURIComponent(teraboxUrl);

  try {
    const endpoint = `https://tboxdownloader.in/tbox/tp/v1/s2_v1.php?data=${encoded}`;
    const res = await fetch(endpoint);
    if (!res.ok) throw new Error("Failed to fetch video from Server 2");
    const data = await res.json();

    if (!data || !data.direct_link) {
      fileInfo.textContent = "No video found!";
      loadingOverlay.style.display = "none";
      return;
    }

    // Update file info
    fileInfo.textContent = `${data.file_name || "Video"} - ${data.size || ""}`;

    // Add video player
    const videoEl = document.createElement("video");
    videoEl.src = `https://sweet-field-bb2f.hdmovielover.workers.dev/?url=${encodeURIComponent(data.direct_link)}`;
    videoEl.controls = true;
    videoEl.autoplay = true;
    videoWrapper.appendChild(videoEl);

    // Hide loader
    loadingOverlay.style.display = "none";

    // Show download button
    downloadBtn.href = data.direct_link;
    downloadBtn.textContent = `Download (${data.size || "Video"})`;
    downloadBtn.classList.remove("hidden");

  } catch (err) {
    console.error(err);
    fileInfo.textContent = "Failed to load video. Try refreshing!";
    loadingOverlay.style.display = "none";
  }
});
</script>

</body>
</html>
