<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraPlayer - 9:16 Video Player</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0f0f0f;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    #video-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 420px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      background-color: #000;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #loading-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1.2rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="video-container">
    <div class="video-wrapper">
      <div id="loading-text">Loading video...</div>
      <iframe id="video-iframe" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const teraboxUrl = params.get('q');
      const iframe = document.getElementById('video-iframe');
      const loadingText = document.getElementById('loading-text');

      if (!teraboxUrl) {
        loadingText.textContent = "❌ No TeraBox URL provided.";
        return;
      }

      try {
        loadingText.textContent = "⏳ Fetching video...";
        const response = await fetch(`https://teraboxdownloaderapi.vercel.app/api/info?url=${encodeURIComponent(teraboxUrl)}`);
        const data = await response.json();

        if (data?.success && data?.data?.list?.length > 0) {
          const videoUrl = data.data.list[0].link;
          iframe.src = videoUrl;
          loadingText.style.display = "none";
        } else {
          loadingText.textContent = "⚠️ Failed to fetch video link.";
        }
      } catch (error) {
        loadingText.textContent = "⚠️ Error loading video.";
        console.error("Video fetch error:", error);
      }
    });
  </script>
</body>
</html>
