<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraBox Video Player - Server 2</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 { color: #00d1ff; margin-bottom: 20px; }
    #videoContainer { margin-top: 20px; }
    #popupVideo {
      width: 100%;
      max-width: 800px;
      height: 450px;
      background: #000;
      border-radius: 8px;
    }
    #downloadLink {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 16px;
      background: #28a745;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }
    #loadingText {
      font-size: 16px;
      color: #ccc;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>TeraBox Video Player - Server 2</h1>

<div id="videoContainer">
  <video id="popupVideo" controls autoplay></video>
  <div id="loadingText">Fetching video, please wait...</div>
  <a id="downloadLink" href="#" target="_blank" rel="noreferrer" style="display:none;">Download Video</a>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const params = new URLSearchParams(window.location.search);
  const teraboxUrl = params.get("q");
  const video = document.getElementById("popupVideo");
  const downloadLink = document.getElementById("downloadLink");
  const loadingText = document.getElementById("loadingText");

  if (!teraboxUrl) {
    loadingText.textContent = "Error: No TeraBox link found in URL.";
    return;
  }

  try {
    const encoded = encodeURIComponent(teraboxUrl);
    const endpoint = `https://tboxdownloader.in/tbox/tp/v1/s2_v1.php?data=${encoded}`;
    const res = await fetch(endpoint);
    if (!res.ok) throw new Error("Server 2 request failed");
    const data = await res.json();

    if (data && data.direct_link) {
      const finalUrl = `https://sweet-field-bb2f.hdmovielover.workers.dev/?url=${encodeURIComponent(data.direct_link)}`;
      video.src = finalUrl;
      video.play();

      loadingText.style.display = "none";

      // Show download link
      downloadLink.href = data.direct_link;
      downloadLink.textContent = `Download (${data.size || "Video"})`;
      downloadLink.style.display = "inline-block";
    } else {
      loadingText.textContent = "No video found on Server 2!";
    }
  } catch (err) {
    console.error(err);
    loadingText.textContent = "Failed to fetch video from Server 2.";
  }
});
</script>

</body>
</html>
