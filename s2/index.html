<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraBox Downloader & Player</title>
  <link rel="icon" href="https://terabox.com/favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #111, #000);
      color: #fff;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(255, 255, 255, 0.05);
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,255,255,0.2);
      width: 90%;
      max-width: 600px;
    }
    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      outline: none;
      margin-bottom: 15px;
      text-align: center;
      background: #222;
      color: #fff;
    }
    button {
      background: linear-gradient(90deg, #00ffff, #0077ff);
      color: #000;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    button:hover {
      transform: scale(1.05);
      background: linear-gradient(90deg, #00ccff, #0055ff);
    }
  </style>
</head>
<body>
  <h1>🎬 TeraBox Downloader & Player</h1>
  <div class="container">
    <input type="text" id="teraboxLink" placeholder="Paste your TeraBox link here...">
    <button id="downloadBtn">Get Video</button>
    <div id="output"></div>
  </div>

  <footer style="margin-top: 20px; opacity: 0.7;">⚡ Powered by <b>TBoxDownloader.in</b></footer>

  <script>
    const btn = document.getElementById('downloadBtn');
    const out = document.getElementById('output');

    btn.addEventListener('click', async () => {
      const link = document.getElementById('teraboxLink').value.trim();
      if (!link) return out.innerHTML = "<p style='color:yellow'>Please paste a TeraBox link first.</p>";

      out.innerHTML = "<p style='color:#0ff'>Fetching video info...</p>";

      try {
        // ✅ New working API (auto fallback if old one fails)
        const apiUrls = [
          "https://tboxdownloader.in/tbox/basic/v2/tbox_v3.php",
          "https://tboxdownloader.in/tbox/basic/v2/tbox_v4.php",
          "https://tboxdownloader.in/api/getinfo.php"
        ];

        let data;
        for (const api of apiUrls) {
          try {
            const res = await fetch(api, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ link })
            });
            if (res.ok) {
              data = await res.json();
              if (data?.files?.[0]) break;
            }
          } catch {}
        }

        if (!data || !data.files || !data.files.length)
          throw new Error("No file info found. Try another link.");

        const f = data.files[0];
        const videoUrl = f.m3u8_url || f.proxy_download_url || f.download_link;
        const thumb = f.thumbnail || '';
        const name = f.file_name || 'Unknown';
        const size = f.file_size || 'Unknown';

        out.innerHTML = `
          <div style='margin-top:20px'>
            ${thumb ? `<img src='${thumb}' style='max-width:200px;border-radius:8px;margin-bottom:10px;'>` : ''}
            <p><b>${name}</b> (${size})</p>
            <button id="watchBtn" style="background:#ffc107;color:#000;margin-right:10px;">Watch Online</button>
            <a href="${videoUrl}" download style="background:#28a745;color:#fff;padding:10px 16px;border-radius:6px;text-decoration:none;">Download</a>
          </div>
        `;

        document.getElementById('watchBtn').onclick = () => {
          playVideo(videoUrl);
        };

      } catch (e) {
        out.innerHTML = `<p style='color:red'>❌ ${e.message}</p>`;
      }
    });

    function playVideo(url) {
      const modal = document.createElement("div");
      modal.style.cssText = `
        position:fixed;top:0;left:0;width:100%;height:100%;
        background:rgba(0,0,0,0.9);display:flex;
        justify-content:center;align-items:center;z-index:9999;
      `;
      modal.innerHTML = `
        <video id="player" controls autoplay style="width:90%;max-width:800px;border-radius:8px;background:#000;"></video>
        <button style="position:absolute;top:20px;right:20px;background:#f00;color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;">✖</button>
      `;
      document.body.appendChild(modal);
      const player = modal.querySelector("#player");
      const close = modal.querySelector("button");

      close.onclick = () => modal.remove();
      if (url.endsWith(".m3u8") && Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(player);
        hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
      } else {
        player.src = url;
        player.play();
      }
    }
  </script>
</body>
</html>
