<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TeraBox Player Fixed</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  body {background:#111;color:#fff;text-align:center;font-family:sans-serif;margin:0;}
  video {width:100%;max-width:380px;aspect-ratio:9/16;background:#000;border-radius:8px;}
  .btn{display:inline-block;margin:6px;padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:bold}
  .btn-primary{background:#007bff;color:#fff}
  .btn-success{background:#28a745;color:#fff}
  .btn-watch{background:#ffc107;color:#000}
</style>
</head>
<body>

<h2>TeraPlayer</h2>
<video id="player" controls autoplay playsinline></video>
<p id="status">Fetching video link...</p>
<div id="actions"></div>

<script>
(async () => {
  const q = new URLSearchParams(window.location.search).get("q");
  const status = document.getElementById("status");
  const player = document.getElementById("player");
  const actions = document.getElementById("actions");

  if (!q) {
    status.textContent = "❌ No video link found!";
    return;
  }

  try {
    const api = `https://tboxdownloader.in/tbox/tp/basic/v2/tbox_v2.php?url=${encodeURIComponent(q)}`;
    const res = await fetch(api);
    const data = await res.json();
    if (!data || !data.directlink) throw new Error("API invalid response");

    const direct = data.directlink;
    const fast = direct.replace("https://d.terabox.app", "https://d8.freeterabox.com");

    // Buttons
    actions.innerHTML = `
      <a href="${direct}" target="_blank" class="btn btn-primary">Download</a>
      <a href="${fast}" target="_blank" class="btn btn-success">Fast Download</a>
      <button id="watch" class="btn btn-watch">Watch Online</button>
    `;

    // default try to play
    await playVideo(fast);
    status.textContent = "▶️ Playing video...";

    document.getElementById("watch").onclick = async () => {
      status.textContent = "Loading player...";
      await playVideo(fast);
    };

  } catch (err) {
    console.error(err);
    status.textContent = "⚠️ Failed to fetch or play video.";
  }

  async function playVideo(url) {
    const proxy = `https://cdn.jsdelivr.net/gh/hlsjs/hls.js@master/demo/?url=${encodeURIComponent(url)}`;
    const finalUrl = url.includes(".m3u8") ? url : proxy;

    try {
      if (window.Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(finalUrl);
        hls.attachMedia(player);
        hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
      } else if (player.canPlayType("application/vnd.apple.mpegurl")) {
        player.src = finalUrl;
        player.play();
      } else {
        player.src = url;
        player.play();
      }
    } catch (e) {
      console.error("Play error:", e);
      status.textContent = "❌ Unable to play video.";
    }
  }
})();
</script>

</body>
</html>
