<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeraBox Video Player</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      margin: 0;
      padding: 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      width: 100%;
      height: 64px;
      background: #1f1f1f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      box-sizing: border-box;
    }
    header h1 {
      font-size: 1.2rem;
      font-weight: bold;
    }
    header a {
      background-color: #e74c3c;
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;
      color: white;
      font-size: 0.9rem;
    }
    header a:hover {
      background-color: #c0392b;
    }

    main {
      flex: 1;
      padding: 10px;
    }

    #videoContainer {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #popupVideo {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 9/16;
      background: #000;
      border-radius: 8px;
    }

    .btn {
      display: inline-block;
      margin: 8px;
      padding: 10px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      color: #fff;
    }
    .btn-primary { background: #007bff; }
    .btn-success { background: #28a745; }

    #loadingText {
      font-size: 16px;
      color: #ccc;
      margin-top: 10px;
    }

    footer {
      width: 100%;
      background: #1f1f1f;
      color: #ccc;
      font-size: 0.8rem;
      text-align: center;
      padding: 8px 0;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header>
    <div style="display: flex; align-items: center; gap: 8px;">
      <img src="https://teraplayer.vercel.app/logo.png" alt="Logo" width="40" height="40">
      <h1 style="margin: 0;">TeraPlayer</h1>
    </div>
    <a href="https://t.me/+Q656m5kaC245Njg1" target="_blank" rel="noopener noreferrer">
      Join Channel
    </a>
  </header>

  <main> 
    <div style="text-align:center; margin-bottom:15px;">
  <button id="server1" style="background:#00aaff; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Server 1</button>
  <button id="server2" style="background:#ff007f; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Server 2</button>
  <button id="server3" style="background:#00c853; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Server 3</button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const videoUrl = params.get('q');

  document.getElementById('server1').onclick = () => {
    window.location.href = `https://teraplayer.vercel.app/?q=${encodeURIComponent(videoUrl)}`;
  };

  document.getElementById('server2').onclick = () => {
    window.location.href = `https://teraplayer.vercel.app/s2/?q=${encodeURIComponent(videoUrl)}`;
  };

  document.getElementById('server3').onclick = () => {
    window.location.href = `https://teraplayer.vercel.app/s3/?q=${encodeURIComponent(videoUrl)}`;
  };
</script>
    
    <div id="videoContainer">
      <video id="popupVideo" controls autoplay playsinline preload="auto"></video>
      <div id="loadingText">Fetching video, please wait...</div>
      <div id="outputFastDiv"></div>
    </div>
  </main>

  <footer>
    ** Wait 10–15 sec to start streaming the video. Refresh if it doesn't load **
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(window.location.search);
      const teraboxUrl = params.get("q");
      const popupVideo = document.getElementById("popupVideo");
      const loadingText = document.getElementById("loadingText");
      const outputFastDiv = document.getElementById("outputFastDiv");

      if (!teraboxUrl) {
        loadingText.textContent = "❌ No TeraBox link found in URL.";
        return;
      }

      const encoded = encodeURIComponent(teraboxUrl);
      let api1Success = false;

      try {
        const endpoint1 = `https://tboxdownloader.in/tbox/tp/v1/s1_v2.php?url=${encoded}`;
        const response = await fetch(endpoint1);
        if (!response.ok) throw new Error("API 1 failed to respond");

        const data = await response.json();
        if (data && data.directlink) {
          api1Success = true;

          const wrapper = document.createElement("div");
          wrapper.style = `
            margin-top:20px;padding:15px;background:#ffffff22;
            border-radius:8px;text-align:left;
          `;
          wrapper.innerHTML = `
            <h3 style="
              margin-bottom:8px;
              word-wrap:break-word;
              overflow-wrap:break-word;
              word-break:break-all;
            ">${data.file_name || "Unknown File"}</h3>
            <p style="margin-bottom:12px;">Size: ${data.size || "Unknown"}</p>
          `;

          // Download buttons
          const directBtn = document.createElement("a");
          directBtn.href = data.directlink;
          directBtn.target = "_blank";
          directBtn.rel = "noreferrer";
          directBtn.className = "btn btn-primary";
          directBtn.textContent = "Download";

          const fastLink = data.directlink.replace(
            "https://d.terabox.app",
            "https://d8.freeterabox.com"
          );
          const fastBtn = document.createElement("a");
          fastBtn.href = fastLink;
          fastBtn.target = "_blank";
          fastBtn.rel = "noreferrer";
          fastBtn.className = "btn btn-success";
          fastBtn.textContent = "Fast Download";

          wrapper.append(directBtn, fastBtn);
          outputFastDiv.innerHTML = "";
          outputFastDiv.append(wrapper);

          // Auto-play directly
          const finalUrl = `https://sweet-field-bb2f.hdmovielover.workers.dev/?url=${encodeURIComponent(fastLink)}`;
          popupVideo.src = finalUrl;
          popupVideo.play();

          loadingText.style.display = "none";
        }
      } catch (err) {
        console.error("API 1 error:", err);
        loadingText.textContent = "⚠️ Failed to fetch from API 1.";
      }

      if (!api1Success) {
        loadingText.textContent = "No playable link found.";
      }
    });
  </script>
</body>
</html>
