<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraBox Downloader</title>
  <link rel="icon" href="logo.png">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }

    header {
      margin-top: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header img {
      width: 45px;
      height: 45px;
      border-radius: 8px;
    }

    header h1 {
      font-size: 1.8rem;
      background: linear-gradient(90deg, #00d4ff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .container {
      margin-top: 40px;
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 20px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(90deg, #ff00ff, #00d4ff);
      color: #fff;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.85;
    }

    #output {
      margin-top: 25px;
      text-align: center;
    }

    a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Logo">
    <h1>TeraBox Downloader</h1>
  </header>

  <div class="container">
    <input type="text" id="teraboxLink" placeholder="Paste TeraBox link here..." />
    <button id="downloadV1Button">Get Download Links</button>
    <div id="output"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const downloadV1Button = document.getElementById('downloadV1Button');
      const output = document.getElementById('output');
      const linkInput = document.getElementById('teraboxLink');

      // -----------------------------
      // Video Player Modal
      // -----------------------------
      const modal = document.createElement("div");
      modal.style.position = "fixed";
      modal.style.top = "0";
      modal.style.left = "0";
      modal.style.width = "100%";
      modal.style.height = "100%";
      modal.style.background = "rgba(0,0,0,0.8)";
      modal.style.display = "none";
      modal.style.justifyContent = "center";
      modal.style.alignItems = "center";
      modal.style.zIndex = "9999";
      modal.innerHTML = `
        <button id="closeModal" style="
          position:absolute;
          top:20px;
          right:20px;
          width:36px;
          height:36px;
          border-radius:50%;
          background:#ff4444;
          color:#fff;
          border:none;
          cursor:pointer;
          font-size:18px;
          font-weight:bold;
          display:flex;
          align-items:center;
          justify-content:center;
          z-index:10000;
        ">✖</button>    
        <div style="
          background:#000;
          border-radius:8px;
          width:90%;
          max-width:800px;
          aspect-ratio:16 / 9;
          overflow:hidden;
        ">
          <video id="popupVideo" controls style="width:100%; height:100%; object-fit:contain; background:#000;"></video>
        </div>
      `;
      document.body.appendChild(modal);

      const popupVideo = modal.querySelector("#popupVideo");
      const closeModal = modal.querySelector("#closeModal");

      closeModal.addEventListener("click", () => {
        popupVideo.pause();
        popupVideo.src = "";
        modal.style.display = "none";
      });

      modal.addEventListener("click", (e) => {
        if (e.target === modal) {
          popupVideo.pause();
          popupVideo.src = "";
          modal.style.display = "none";
        }
      });

      // -----------------------------
      // Main Downloader Logic
      // -----------------------------
      downloadV1Button.addEventListener('click', async () => {
        const link = linkInput.value.trim();
        if (!link) {
          output.innerHTML = '<p style="color:yellow; text-align:center; margin-top:15px;">Please enter a TeraBox link first.</p>';
          return;
        }

        // Loader spinner
        output.innerHTML = `
          <div style="display:flex;justify-content:center;align-items:center;margin-top:25px;">
            <div style="
              width:40px;height:40px;
              border:4px solid #fff;
              border-top-color:transparent;
              border-radius:50%;
              animation:spin 1s linear infinite;">
            </div>
          </div>
          <style>
            @keyframes spin { to { transform: rotate(360deg); } }
          </style>
        `;

        try {
          const res = await fetch('https://tboxdownloader.in/tbox/basic/v2/tbox_v2.php', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify({ link })
          });

          if (!res.ok) throw new Error('Network response was not ok');
          const data = await res.json();

          if (data.error) {
            output.innerHTML = `<p style="color:#ff5722; text-align:center; margin-top:15px;">Error: ${data.error}</p>`;
            return;
          }

          const file = data.files && data.files[0];
          const fileName = file.file_name || 'Unknown File';
          const fileSize = file.file_size || 'Unknown Size';
          const fastLink = file.proxy_download_url;
          const playLink = file.m3u8_url;
          const directLink = file.download_link;

          const baseBtnStyle = "display:inline-block;margin-right:10px;padding:10px 16px;color:#fff;text-decoration:none;border-radius:6px;";

          output.innerHTML = `
            <div style="text-align:center; color:#fff; margin-top:25px;">
              <p><strong>File Name:</strong> ${fileName}</p>
              <p><strong>File Size:</strong> ${fileSize}</p>

              <a id="fastDownloadBtn"
                 href="${fastLink}"
                 target="_blank"
                 rel="noreferrer"
                 style="${baseBtnStyle}background:#28a745;">
                 Fast Download
              </a>

              <a id="directDownloadBtn"
                 href="${directLink}"
                 target="_blank"
                 rel="noreferrer"
                 style="${baseBtnStyle}background:#0056B3;">
                 Download Now
              </a>

              <a id="watchOnlineBtn"
                 href="#"
                 style="${baseBtnStyle}background:#ffc107;color:#000;">
                 Watch Online
              </a>
            </div>
          `;

          // Play M3U8 in modal
          const watchOnlineBtn = document.getElementById('watchOnlineBtn');
          watchOnlineBtn.addEventListener('click', (e) => {
            e.preventDefault();
            modal.style.display = "flex";

            if (window.Hls && Hls.isSupported()) {
              const hls = new Hls();
              hls.loadSource(playLink);
              hls.attachMedia(popupVideo);
              hls.on(Hls.Events.MANIFEST_PARSED, () => popupVideo.play());
            } else if (popupVideo.canPlayType('application/vnd.apple.mpegurl')) {
              popupVideo.src = playLink;
              popupVideo.play();
            } else {
              alert("Your browser doesn't support HLS playback.");
            }
          });

        } catch (err) {
          console.error(err);
          output.innerHTML = '<p style="color:#ff5722; text-align:center; margin-top:15px;">Failed to fetch file info. Try again.</p>';
        }
      });
    });
  </script>
</body>
</html>
